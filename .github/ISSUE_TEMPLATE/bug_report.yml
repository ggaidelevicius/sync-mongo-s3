name: Bug report
description: Report a reproducible bug in @ggaidelevicius/payload-isr
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal reproducible case.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise bug summary.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and configuration snippets where relevant.
      placeholder: |
        1. Configure plugin with ...
        2. Update collection/global ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Version of @ggaidelevicius/payload-isr
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: payload-version
    attributes:
      label: Payload version
      placeholder: e.g. 3.78.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 22.14.0
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime/framework
      options:
        - Next.js
        - Other Node.js framework
        - Unknown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I can reproduce this with current package version.
          required: true
